name: Auto Contribution Streak

on:
  schedule:
    - cron: "0 9 * * *"     # Runs every day at 09:00 UTC (02:00 PM PKT / 02:30 PM IST)
  workflow_dispatch:        # Allows manual triggering from the Actions tab

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Update contribution log
        run: |
          echo "Last Auto Contribution: $(date)" > streak.txt

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add streak.txt
          git commit -m "chore: auto-update contribution streak [skip ci]" || echo "No changes to commit"
          git push origin main
