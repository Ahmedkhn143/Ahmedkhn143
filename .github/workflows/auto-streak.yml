name: Auto Contribution Streak

on:
  schedule:
    - cron: "0 9 * * *"      # Runs every day at 09:00 UTC (2:00 PM PKT)
    - cron: "0 15 * * *"     # Runs every day at 15:00 UTC (8:00 PM PKT)
    - cron: "0 12 * * *"     # Extra run at 12:00 UTC (5:00 PM PKT)
  workflow_dispatch:          # Allows manual triggering from the Actions tab

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Pull latest changes
        run: git pull origin main --rebase

      - name: Update contribution log
        run: |
          DATE=$(date +"%Y-%m-%d")
          TIME=$(date +"%H:%M:%S UTC")
          RUN_NUMBER=${{ github.run_number }}
          UNIQUE_ID=$(date +"%s")
          DAY_OF_YEAR=$(date +"%j")
          
          echo "=================================" > streak.txt
          echo "  GitHub Auto Streak - Active!  " >> streak.txt
          echo "=================================" >> streak.txt
          echo "" >> streak.txt
          echo "Last Contribution : $DATE at $TIME" >> streak.txt
          echo "Run Number        : #$RUN_NUMBER" >> streak.txt
          echo "Unique ID         : $UNIQUE_ID" >> streak.txt
          echo "Day of Year       : $DAY_OF_YEAR" >> streak.txt
          echo "" >> streak.txt
          echo "Keep the streak alive! 🔥" >> streak.txt
          echo "" >> streak.txt
          echo "--- Activity Log ---" >> streak.txt
          # Append to activity log (keeps history alive = prevents GitHub disabling workflow)
          echo "[$DATE $TIME] Run #$RUN_NUMBER - OK" >> activity_log.txt

      - name: Commit and Push changes
        run: |
          git config --global user.name "Ahmedkhn143"
          git config --global user.email "ahmedkhn143@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "🔥 streak: auto contribution [$(date +'%Y-%m-%d %H:%M UTC')]"
          git push origin main
